name: cs_profile
channels: [conda-forge, bioconda]
# MetaPhlAn taxonomic profiling for the read -> relative-abundance pipeline (stages s4 / s4b).
# QC/host tools (FastQC, fastp, bowtie2, samtools) come from the Torch module bundle, not this env.
dependencies:
  - python=3.10
  - metaphlan=4.1.1
  - seqkit=2.8.2
  - pandas
